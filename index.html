<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>편집국을 위한 잡무처리기</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <p class="eyebrow">Newsroom helper</p>
        <h1>편집국을 위한 잡무처리기</h1>
        <p class="sub">
          환율 기준값은 한국은행 ECOS를 참고하고, 장중 지수/환율 현재값은 yfinance를 이용해 문안을 생성합니다.
        </p>
      </header>

      <section class="panel form-panel">
        <h2>수동 입력</h2>
        <p class="hint">유가증권시장 수급 숫자만 넣으면 바로 복사할 수 있게 구성했습니다.</p>

        <div class="grid3">
          <label>
            <span>외국인 금액(억원)</span>
            <input id="foreigner_amount" type="text" placeholder="2485" />
          </label>

          <label>
            <span>외국인 방향</span>
            <select id="foreigner_flow">
              <option value="sell" selected>순매도</option>
              <option value="buy">순매수</option>
            </select>
          </label>

          <div></div>

          <label>
            <span>개인 금액(억원)</span>
            <input id="individual_amount" type="text" placeholder="32" />
          </label>

          <label>
            <span>개인 방향</span>
            <select id="individual_flow">
              <option value="buy" selected>사들이고 있다</option>
              <option value="sell">팔고 있다</option>
            </select>
          </label>

          <div></div>

          <label>
            <span>기관 금액(억원)</span>
            <input id="institution_amount" type="text" placeholder="877" />
          </label>

          <label>
            <span>기관 방향</span>
            <select id="institution_flow">
              <option value="sell" selected>순매도</option>
              <option value="buy">순매수</option>
            </select>
          </label>

          <div></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>자동 생성 기사</h2>
          <button id="copyBtn" class="secondary">기사 복사</button>
        </div>

        <div class="article-controls">
          <label class="article-type-field">
            <span>기사 유형 선택</span>
            <select id="article_type">
              <option value="" selected>선택하세요</option>
              <option value="intraday">장중 기사</option>
              <option value="opening">개장 기사</option>
              <option value="weekly_close">주간 종가 기사</option>
            </select>
          </label>

          <button id="refreshBtn">문안 생성</button>
        </div>

        <p id="status" class="status">기사 유형을 선택한 뒤 문안 생성 버튼을 누르세요.</p>
        <textarea id="article" readonly></textarea>
      </section>

      <section class="panel meta-panel">
        <h2>참고 데이터</h2>
        <pre id="meta"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
